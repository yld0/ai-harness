version: 1
cases:
  - id: macro-catchup-01
    input: Summarize the main macro themes from the last FOMC and how they affect risk assets.
    route: chats
    mode: auto
    expected_capabilities: [macro, rates]
    required_tools_or_sources: [web_search, expert_context]
    forbidden: [guaranteed_returns, personalized_investment_advice]
    rubric: Cites policy stance, inflation outlook, and conditional market reaction; no trade recommendations.
    tier: T0
    tags: [market, macro]

  - id: macro-catchup-02
    input: What moved the 10-year Treasury this week and what to watch next?
    route: chats
    mode: auto
    expected_capabilities: [rates, markets]
    required_tools_or_sources: [web_search]
    forbidden: [fabricated_data]
    expected_substrings: [yield, Treasury]
    tier: T0
    tags: [market, macro]

  - id: valuation-dcf-01
    input: Sanity-check a DCF for MSFT using conservative terminal growth — what are the top three sensitivities?
    route: valuation
    mode: plan
    expected_capabilities: [dcf, sensitivity]
    required_tools_or_sources: [read_file, fmp_quote]
    forbidden: [exact_price_target_without_assumptions]
    rubric: Names revenue growth, margin, WACC or terminal growth as sensitivities; states assumption dependence.
    tier: T0
    tags: [valuation, dcf]

  - id: valuation-dcf-02
    input: Is AAPL trading above or below a rough fair value band if we cap terminal growth at 2.5%?
    route: valuation
    mode: criticise
    expected_capabilities: [relative_valuation, challenge]
    required_tools_or_sources: [fmp_profile]
    forbidden: [certainty, insider_info]
    expected_substrings: [assumption, terminal]
    tier: T1
    tags: [valuation, dcf]

  - id: earnings-summary-01
